<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#ffffff">
    <title>Glass Caustics Shader</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #e9e9ec;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // SCENE
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // VERTEX SHADER (glass distortion)
        const vertexShader = `
varying vec2 vUv;
uniform float u_time;

void main(){
    vUv = uv;

    vec3 pos = position;

    float waveX = sin(pos.y * 6.0 + u_time * 0.8) * 0.015;
    float waveY = cos(pos.x * 6.0 + u_time * 0.6) * 0.015;

    pos.x += waveX;
    pos.y += waveY;

    gl_Position = vec4(pos,1.0);
}
`;

        // FRAGMENT SHADER (realistic caustics)
        const fragmentShader = `
uniform float u_time;
uniform vec2 u_resolution;

varying vec2 vUv;

// noise utils
float hash(vec2 p){
    return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453);
}

float noise(vec2 p){
    vec2 i = floor(p);
    vec2 f = fract(p);

    float a = hash(i);
    float b = hash(i + vec2(1.0,0.0));
    float c = hash(i + vec2(0.0,1.0));
    float d = hash(i + vec2(1.0,1.0));

    vec2 u = f*f*(3.0-2.0*f);

    return mix(a,b,u.x) +
           (c-a)*u.y*(1.0-u.x) +
           (d-b)*u.x*u.y;
}

float fbm(vec2 p){
    float v = 0.0;
    float a = 0.5;

    for(int i=0;i<5;i++){
        v += a * noise(p);
        p *= 2.0;
        a *= 0.5;
    }
    return v;
}

vec3 spectrum(float t){
    return 0.55 + 0.45*cos(6.28318*(t + vec3(0.0,0.33,0.66)));
}

void main(){

    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
    uv -= 0.5;
    uv.x *= u_resolution.x / u_resolution.y;

    float time = u_time * 0.25;

    // glass distortion
    vec2 warp = uv;
    warp += vec2(
        fbm(uv * 2.5 + time),
        fbm(uv * 2.5 - time)
    ) * 0.15;

    // caustics via gradient
    float n = fbm(warp * 3.0);

    float dx = dFdx(n);
    float dy = dFdy(n);

    float caustic = pow(length(vec2(dx, dy)), 1.5);

    // directional streaks
    float streaks = sin((warp.x + warp.y) * 10.0 + n * 4.0);
    streaks = smoothstep(0.2, 1.0, streaks);

    float light = caustic * 1.2 + streaks * 0.6;

    // mirror-like attenuation
    light *= 1.0 - abs(uv.x * 0.6);

    // chromatic dispersion
    float r = light + fbm(warp + 0.01);
    float g = light;
    float b = light - fbm(warp - 0.01);

    vec3 color = spectrum(light + time * 0.15);
    color *= vec3(r,g,b);

    vec3 bg = vec3(0.93,0.93,0.95);

    vec3 finalColor = mix(bg, bg + color, light);

    finalColor += pow(light,3.0) * 0.4;

    float grain = hash(gl_FragCoord.xy) * 0.025;
    finalColor += grain;

    gl_FragColor = vec4(finalColor,1.0);
}
`;

        // MATERIAL
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                u_time: { value: 0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            }
        });

        // PLANE
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
        scene.add(mesh);

        // RESIZE
        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });

        // ANIMATION
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.u_time.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }

        animate();
    </script>

    <script src="./js/lazyload.js" defer></script>
</body>

</html>
